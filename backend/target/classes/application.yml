server:
  port: 8080

spring:
  application:
    name: ops-copilot
  
  # 数据库配置 (如无数据库可注释)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ops_copilot?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

# Ollama配置
ollama:
  base-url: http://localhost:11434
  model: qwen3.5:9B

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# 业务配置
ops-copilot:
  version: MVP
